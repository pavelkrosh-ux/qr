<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сканер штрих-кода</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Библиотека html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      min-height: 100vh;
    }

    h2 {
      margin-bottom: 12px;
      font-size: 18px;
      text-align: center;
    }

    #reader {
      width: 100%;
      max-width: 360px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--tg-theme-button-color, #2481cc);
    }

    #result-box {
      display: none;
      margin-top: 20px;
      width: 100%;
      max-width: 360px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    #result-box .label {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }

    #result-text {
      font-size: 20px;
      font-weight: bold;
      word-break: break-all;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      max-width: 360px;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
    }

    button:active { opacity: 0.8; }

    #btn-rescan { display: none; }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>

  <h2>Сканер штрих-кода</h2>

  <div id="reader"></div>
  <div id="status">Наведите камеру на штрих-код или QR-код</div>

  <div id="result-box">
    <div class="label">Распознанный код:</div>
    <div id="result-text"></div>
  </div>

  <button id="btn-send" style="display:none" onclick="sendToBot()">
    ✅ Отправить боту
  </button>
  <button id="btn-rescan" onclick="rescan()">
    🔄 Сканировать снова
  </button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let scannedCode = null;
    let scanner = null;

    function startScanner() {
      scanner = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then(devices => {
        if (!devices || devices.length === 0) {
          document.getElementById("status").textContent = "Камера не найдена";
          return;
        }

        // Предпочитаем заднюю камеру
        const camera = devices.find(d =>
          d.label.toLowerCase().includes("back") ||
          d.label.toLowerCase().includes("rear") ||
          d.label.toLowerCase().includes("environment")
        ) || devices[devices.length - 1];

        scanner.start(
          camera.id,
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess,
          onScanError
        );

        document.getElementById("status").textContent = "Камера активна...";
      }).catch(err => {
        document.getElementById("status").textContent =
          "Ошибка доступа к камере: " + err;
      });
    }

    function onScanSuccess(decodedText) {
      // Останавливаем сканер после первого успешного результата
      scanner.stop().then(() => {
        scannedCode = decodedText;

        document.getElementById("status").textContent = "";
        document.getElementById("result-text").textContent = decodedText;
        document.getElementById("result-box").style.display = "block";
        document.getElementById("btn-send").style.display = "block";
        document.getElementById("btn-rescan").style.display = "block";
      });
    }

    function onScanError(error) {
      // Игнорируем — это нормально, пока не найден код
    }

    function sendToBot() {
      if (!scannedCode) return;

      // Если открыто в Telegram — отправляем через sendData
      if (tg.initData) {
        tg.sendData(JSON.stringify({ barcode: scannedCode }));
      } else {
        // Если открываете в обычном браузере для теста — просто алерт
        alert("Код для бота: " + scannedCode);
      }
    }

    function rescan() {
      scannedCode = null;
      document.getElementById("result-box").style.display = "none";
      document.getElementById("btn-send").style.display = "none";
      document.getElementById("btn-rescan").style.display = "none";
      document.getElementById("status").textContent = "Наведите камеру на штрих-код или QR-код";
      startScanner();
    }

    // Запускаем при загрузке
    startScanner();
  </script>

</body>
</html>
