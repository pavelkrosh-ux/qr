  <style>
    :root {
      --tg-bg: #ffffff;
      --tg-text: #000000;
      --tg-hint: #999999;
      --tg-btn: #3390ec;
      --tg-btn-text: #ffffff;
      --tg-secondary: #f0f0f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Header */
    .header {
      padding: 12px 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header p { font-size: 13px; color: var(--tg-hint); margin-top: 2px; }

    /* Scanner */
    .scanner {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scan overlay */
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dimmer {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.5) 0%,
          rgba(0,0,0,0.5) calc(50% - 130px),
          transparent calc(50% - 130px),
          transparent calc(50% + 130px),
          rgba(0,0,0,0.5) calc(50% + 130px),
          rgba(0,0,0,0.5) 100%
        );
    }

    .frame {
      width: 260px;
      height: 260px;
      position: relative;
    }

    .c { position: absolute; width: 28px; height: 28px; }
    .c::before, .c::after {
      content: '';
      position: absolute;
      background: var(--tg-btn);
      border-radius: 2px;
    }
    .c::before { width: 28px; height: 3px; }
    .c::after { width: 3px; height: 28px; }
    .c-tl { top: 0; left: 0; }
    .c-tl::before { top: 0; left: 0; }
    .c-tl::after { top: 0; left: 0; }
    .c-tr { top: 0; right: 0; }
    .c-tr::before { top: 0; right: 0; }
    .c-tr::after { top: 0; right: 0; }
    .c-bl { bottom: 0; left: 0; }
    .c-bl::before { bottom: 0; left: 0; }
    .c-bl::after { bottom: 0; left: 0; }
    .c-br { bottom: 0; right: 0; }
    .c-br::before { bottom: 0; right: 0; }
    .c-br::after { bottom: 0; right: 0; }

    .scan-line {
      position: absolute;
      left: 6px; right: 6px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--tg-btn), transparent);
      opacity: 0.8;
      animation: scan 2.2s ease-in-out infinite;
    }
    @keyframes scan {
      0%, 100% { top: 6px; }
      50% { top: calc(100% - 8px); }
    }

    /* Badge */
    .badge {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      display: flex; align-items: center; gap: 6px;
      z-index: 10;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34c759;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* Torch */
    .torch {
      position: absolute; bottom: 16px; right: 16px;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: none; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .torch.on { display: flex; }
    .torch.active { background: rgba(255,214,10,0.3); }
    .torch svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2; fill: none; }

    /* Status */
    .status {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px 24px;
      text-align: center;
    }
    .status.on { display: flex; }
    .status-icon { font-size: 48px; }
    .status-text { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.4; }

    /* Sent */
    .sent {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px; padding: 24px;
      text-align: center;
    }
    .sent.on { display: flex; }
    .sent-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: #34c759;
      display: flex; align-items: center; justify-content: center;
      animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .sent-icon svg { width: 32px; height: 32px; stroke: #fff; stroke-width: 3; fill: none; }
    .sent-title { font-size: 17px; font-weight: 600; color: #fff; margin-top: 4px; }
    .sent-sub { font-size: 14px; color: rgba(255,255,255,0.55); }
    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    /* Dim overlay for paused state */
    .dim { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: none; z-index: 5; }
    .dim.on { display: block; }

    /* Bottom panel */
    .panel {
      flex-shrink: 0;
      padding: 16px;
      background: var(--tg-bg);
      border-top: 1px solid var(--tg-secondary);
      min-height: 20px;
    }

    .result {
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .result.on { display: flex; }

    .result-fmt {
      font-size: 11px;
      color: var(--tg-hint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }
    .result-val {
      font-size: 22px;
      font-weight: 700;
      word-break: break-all;
      font-variant-numeric: tabular-nums;
    }

    .btns { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 13px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.7; }
    .btn-p { background: var(--tg-btn); color: var(--tg-btn-text); }
    .btn-s { background: var(--tg-secondary); color: var(--tg-text); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Сканер</h1>
    <p>Наведите камеру на штрих-код</p>
  </div>

  <div class="scanner">
    <div class="status" id="st-load">
      <div class="status-icon">📷</div>
      <div class="status-text">Подключение к камере...</div>
    </div>
    <div class="status" id="st-err">
      <div class="status-icon">⚠️</div>
      <div class="status-text" id="err-text"></div>
    </div>

    <video id="vid" autoplay playsinline muted style="display:none"></video>

    <div class="overlay" id="ov" style="display:none">
      <div class="dimmer"></div>
      <div class="frame">
        <div class="c c-tl"></div><div class="c c-tr"></div>
        <div class="c c-bl"></div><div class="c c-br"></div>
        <div class="scan-line" id="sline"></div>
      </div>
    </div>

    <div class="badge" id="badge" style="display:none">
      <div class="dot"></div>Сканирование
    </div>

    <div class="dim" id="dim"></div>

    <button class="torch" id="torch">
      <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </button>

    <div class="sent" id="sent">
      <div class="sent-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="sent-title">Отправлено</div>
      <div class="sent-sub" id="sent-code"></div>
    </div>
  </div>

  <div class="panel">
    <div class="result" id="res">
      <div>
        <span class="result-fmt" id="r-fmt"></span>
        <div class="result-val" id="r-val"></div>
      </div>
      <div class="btns">
        <button class="btn btn-s" id="b-more">Отменить</button>
        <button class="btn btn-p" id="b-send">Отправить</button>
      </div>
    </div>
  </div>
</div>

<!-- BarcodeDetector polyfill (ZXing C++ WASM) — for browsers without native support (iOS) -->
<script src="https://fastly.jsdelivr.net/npm/barcode-detector@3/dist/iife/index.min.js"></script>

<script>
(function(){
  'use strict';

  // ── State ──
  var stream = null, track = null, torchOn = false;
  var lastCode = null, lastFmt = null;
  var detecting = false;
  var detector = null;
  var detectTimer = null;

  // ── DOM ──
  var vid = document.getElementById('vid');
  var ov = document.getElementById('ov');
  var badge = document.getElementById('badge');
  var sline = document.getElementById('sline');
  var dim = document.getElementById('dim');
  var stLoad = document.getElementById('st-load');
  var stErr = document.getElementById('st-err');
  var errText = document.getElementById('err-text');
  var res = document.getElementById('res');
  var rFmt = document.getElementById('r-fmt');
  var rVal = document.getElementById('r-val');
  var bSend = document.getElementById('b-send');
  var bMore = document.getElementById('b-more');
  var torchBtn = document.getElementById('torch');
  var sentEl = document.getElementById('sent');
  var sentCode = document.getElementById('sent-code');

  // ── Telegram ──
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    var tp = tg.themeParams || {};
    var r = document.documentElement.style;
    if (tp.bg_color) r.setProperty('--tg-bg', tp.bg_color);
    if (tp.text_color) r.setProperty('--tg-text', tp.text_color);
    if (tp.hint_color) r.setProperty('--tg-hint', tp.hint_color);
    if (tp.button_color) r.setProperty('--tg-btn', tp.button_color);
    if (tp.button_text_color) r.setProperty('--tg-btn-text', tp.button_text_color);
    if (tp.secondary_bg_color) r.setProperty('--tg-secondary', tp.secondary_bg_color);
  }

  function sendToBot(code, fmt) {
    var data = JSON.stringify({ barcode: code, format: fmt });
    if (tg && tg.sendData) tg.sendData(data);
    showSent(code);
  }

  // ── Format names ──
  var FMT = {
    'qr_code':'QR_CODE','ean_13':'EAN_13','ean_8':'EAN_8',
    'code_128':'CODE_128','code_39':'CODE_39',
    'upc_a':'UPC_A','upc_e':'UPC_E',
    'codabar':'CODABAR','code_93':'CODE_93',
    'itf':'ITF','pdf417':'PDF_417',
    'aztec':'AZTEC','data_matrix':'DATA_MATRIX'
  };
  function fmtName(f) { return FMT[f] || String(f).toUpperCase(); }

  // ── Camera ──
  async function startCamera() {
    showUI('loading');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      track = stream.getVideoTracks()[0];
      vid.srcObject = stream;
      await new Promise(function(ok){ vid.onloadedmetadata = ok; });
      checkTorch();
      await initDetector();
      showUI('scan');
      startDetect();
    } catch(e) {
      camError(e);
    }
  }

  function camError(e) {
    var m = 'Не удалось подключить камеру.';
    if (e.name === 'NotAllowedError') m = 'Доступ к камере запрещён.<br>Разрешите в настройках.';
    else if (e.name === 'NotFoundError') m = 'Камера не найдена.';
    else if (e.name === 'NotReadableError') m = 'Камера занята другим приложением.';
    errText.innerHTML = m;
    showUI('error');
  }

  // ── BarcodeDetector ──
  async function initDetector() {
    var wantFormats = [
      'qr_code', 'ean_13', 'ean_8', 'code_128', 'code_39',
      'upc_a', 'upc_e', 'itf', 'codabar', 'code_93',
      'pdf417', 'aztec', 'data_matrix'
    ];
    var supported = [];
    try {
      var all = await BarcodeDetector.getSupportedFormats();
      supported = wantFormats.filter(function(f){ return all.indexOf(f) !== -1; });
    } catch(e) {
      supported = wantFormats;
    }
    if (supported.length === 0) supported = wantFormats;
    detector = new BarcodeDetector({ formats: supported });
  }

  function startDetect() {
    if (detecting) return;
    detecting = true;
    doDetect();
  }

  function doDetect() {
    if (!detecting || !stream) return;
    if (vid.readyState < vid.HAVE_ENOUGH_DATA) {
      detectTimer = setTimeout(doDetect, 100);
      return;
    }
    detector.detect(vid).then(function(codes) {
      if (!detecting) return;
      if (codes.length > 0) {
        onFound(codes[0].rawValue, codes[0].format);
      } else {
        detectTimer = setTimeout(doDetect, 150);
      }
    }).catch(function() {
      if (detecting) detectTimer = setTimeout(doDetect, 300);
    });
  }

  function stopDetect() {
    detecting = false;
    if (detectTimer) { clearTimeout(detectTimer); detectTimer = null; }
  }

  function onFound(code, fmt) {
    stopDetect();
    var name = fmtName(fmt);
    lastCode = code;
    lastFmt = name;

    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    else if (navigator.vibrate) navigator.vibrate(100);

    rFmt.textContent = name;
    rVal.textContent = code;
    showUI('result');
  }

  function resume() {
    lastCode = null;
    lastFmt = null;
    showUI('scan');
    startDetect();
  }

  // ── Torch ──
  function checkTorch() {
    if (track) {
      try {
        var cap = track.getCapabilities();
        if (cap && cap.torch) torchBtn.classList.add('on');
      } catch(e){}
    }
  }

  function toggleTorch() {
    if (!track) return;
    torchOn = !torchOn;
    track.applyConstraints({ advanced: [{ torch: torchOn }] }).then(function(){
      torchBtn.classList.toggle('active', torchOn);
    }).catch(function(){ torchOn = false; });
  }

  function esc(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

  // ── UI States ──
  function showUI(s) {
    stLoad.classList.remove('on');
    stErr.classList.remove('on');
    vid.style.display = 'none';
    ov.style.display = 'none';
    badge.style.display = 'none';
    dim.classList.remove('on');
    res.classList.remove('on');
    sentEl.classList.remove('on');
    sline.style.display = '';

    switch(s) {
      case 'loading':
        stLoad.classList.add('on'); break;
      case 'error':
        stErr.classList.add('on'); break;
      case 'scan':
        vid.style.display = 'block';
        ov.style.display = 'flex';
        badge.style.display = 'flex';
        break;
      case 'result':
        vid.style.display = 'block';
        ov.style.display = 'flex';
        dim.classList.add('on');
        sline.style.display = 'none';
        badge.style.display = 'none';
        res.classList.add('on');
        break;
      case 'sent':
        sentEl.classList.add('on'); break;
    }
  }

  function showSent(code) {
    sentCode.textContent = code;
    showUI('sent');
    setTimeout(resume, 1500);
  }

  // ── Events ──
  bSend.onclick = function() { if (lastCode) sendToBot(lastCode, lastFmt); };
  bMore.onclick = resume;
  torchBtn.onclick = toggleTorch;

  // ── Init ──
  startCamera();
})();
</script>
</body>
</html>
